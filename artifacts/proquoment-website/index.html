    <link

      rel="stylesheet"
    />
  </head>
  <script>
    const { createClient } = supabase;
    const client = createClient(
      "https://gbgkemtfsxhpxjvkmxes.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiZ2tlbXRmc3hocHhqdmtteGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDcwNjEsImV4cCI6MjA4OTY4MzA2MX0.C8qGhpoTSpprPXtNeUvdHA7IGkYO2L2Bo_0C2ttdSz8",
    );

    document
      .getElementById("waitlist-form")
      .addEventListener("submit", async (e) => {
        e.preventDefault();
        const intent = document.querySelector('input[name="intent"]:checked');

        const { error } = await client.from("proquomentwaitlist").insert([
          {
            full_name: document.getElementById("full-name").value,
            work_email: document.getElementById("work-email").value,
            company_name: document.getElementById("company-name").value,
            intent_profile: intent ? intent.value : null,
          },
        ]);

        if (error) {
          alert("❌ Error: " + error.message);
        } else {
          alert("🎉 Application submitted!");
          e.target.reset();
        }
      });
  </script>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
